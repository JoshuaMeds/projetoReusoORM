# TEM QUE CRIAR O BANCO COM O NOME: locatehubORM
spring.datasource.url=jdbc:mysql://localhost:3306/locatehubORM?createDatabaseIfNotExist=true&serverTimezone=UTC

# O user do MySQL (geralmente é root)
spring.datasource.username=root

# A senha do banco no MySQL
spring.datasource.password=PUC@1234

# Driver do MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do JPA / Hibernate
# "update" faz com que o Hibernate crie as tabelas automaticamente se elas não existirem
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true